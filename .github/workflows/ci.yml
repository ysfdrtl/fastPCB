name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore API
        run: dotnet restore backend/FastPCB.API/FastPCB.API.csproj

      - name: Build API
        run: dotnet build backend/FastPCB.API/FastPCB.API.csproj --configuration Release --no-restore

      - name: Build Data Project
        run: dotnet build backend/FastPCB.Data/FastPCB.Data.csproj --configuration Release

      - name: Test Services
        run: dotnet test backend/FastPCB.Services.Tests/FastPCB.Services.Tests.csproj --configuration Release --no-build

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/FastPCB.Web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/FastPCB.Web/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -f Dockerfile .

      - name: Build Frontend Image
        run: docker build -f frontend/FastPCB.Web/Dockerfile frontend/FastPCB.Web

  deploy-handoff:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - docker

    steps:
      - name: Deployment Handoff Placeholder
        run: echo "CI passed on main. Add registry push, migration, and deploy steps for the target platform."
