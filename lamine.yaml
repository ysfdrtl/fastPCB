openapi: 3.0.3
info:
  title: FastPCB Paylasim Platformu API
  version: 1.0.0
  description: |
    FastPCB, kullanicilarin PCB tasarim dosyalarini yukleyip paylasabildigi
    bir topluluk platformunun REST API tanimidir.

    Temel ozellikler:
    - Kullanici kaydi ve girisi
    - PCB projesi olusturma
    - Proje listeleme ve detay goruntuleme
    - Dosya yukleme
    - Yorum ve raporlama

servers:
  - url: http://localhost:5000/api
    description: Development server

tags:
  - name: auth
    description: Kimlik dogrulama islemleri
  - name: users
    description: Kullanici profili islemleri
  - name: projects
    description: PCB proje paylasim islemleri
  - name: comments
    description: Proje yorumlari
  - name: likes
    description: Proje begeni islemleri
  - name: reports
    description: Icerik raporlama islemleri

paths:
  /auth/register:
    post:
      tags: [auth]
      summary: Kullanici kaydi
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, firstName, lastName]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                firstName:
                  type: string
                lastName:
                  type: string
      responses:
        '201':
          description: Kullanici basariyla olusturuldu

  /auth/login:
    post:
      tags: [auth]
      summary: Kullanici girisi
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Giris basarili

  /users/{userId}:
    get:
      tags: [users]
      summary: Profil getir
      operationId: getUserProfile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Profil getirildi
    put:
      tags: [users]
      summary: Profil guncelle
      operationId: updateUserProfile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Profil guncellendi

  /users/{userId}/projects:
    get:
      tags: [users, projects]
      summary: Kullanicinin projelerini listele
      operationId: getUserProjects
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Proje listesi getirildi

  /projects:
    get:
      tags: [projects]
      summary: Proje listele
      operationId: listProjects
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [Draft, Published, Featured, Archived, Removed]
        - name: hasFile
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Projeler listelendi
    post:
      tags: [projects]
      summary: Yeni proje olustur
      operationId: createProject
      responses:
        '201':
          description: Proje olusturuldu

  /projects/{projectId}:
    get:
      tags: [projects]
      summary: Proje detayi getir
      operationId: getProject
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Proje detayi getirildi
    delete:
      tags: [projects]
      summary: Proje sil
      operationId: deleteProject
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Proje silindi

  /projects/{projectId}/details:
    post:
      tags: [projects]
      summary: Proje teknik detaylarini kaydet
      operationId: saveProjectDetails
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                layers:
                  type: integer
                material:
                  type: string
                minDistance:
                  type: number
                  format: double
                quantity:
                  type: integer
      responses:
        '200':
          description: Proje detaylari kaydedildi

  /projects/{projectId}/files:
    post:
      tags: [projects]
      summary: Projeye dosya yukle
      operationId: uploadProjectFile
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Dosya yuklendi

  /projects/{projectId}/comments:
    get:
      tags: [comments]
      summary: Proje yorumlarini listele
      operationId: listComments
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Yorumlar getirildi
    post:
      tags: [comments]
      summary: Projeye yorum ekle
      operationId: createComment
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        responses:
          '201':
            description: Yorum eklendi

  /projects/{projectId}/like:
    post:
      tags: [likes]
      summary: Projeyi begen
      operationId: likeProject
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Proje begenildi
    delete:
      tags: [likes]
      summary: Proje begenisini kaldir
      operationId: unlikeProject
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Begeni kaldirildi

  /likes/me:
    get:
      tags: [likes]
      summary: Giris yapan kullanicinin begendigi projeleri listele
      operationId: listMyLikes
      responses:
        '200':
          description: Begenilen projeler getirildi

  /projects/{projectId}/report:
    post:
      tags: [reports]
      summary: Projeyi raporla
      operationId: reportProject
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Rapor alindi
